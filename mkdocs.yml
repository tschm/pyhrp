INHERIT: docs/mkdocs-base.yml

site_name: pyhrp
site_description: Hierarchical risk parity
site_author: Thomas Schmelzer
site_url: https://tschm.github.io/pyhrp/
repo_url: https://github.com/tschm/pyhrp
repo_name: tschm/pyhrp
copyright: Copyright &copy; 2024–2026 Thomas Schmelzer

docs_dir: docs

nav:
  - Home: index.md
  - API Reference: api.md
  - Notebooks:
    - HRP: notebooks/hrp.html
    - 1/N: notebooks/1_over_N.html
  - Reports:
    - Test Report: reports/html-report/report.html
    - Coverage Report: reports/html-coverage/index.html

# Tell mkdocstrings/griffe where the src-layout package lives so API docs build
# by static analysis of the source, without an editable install. The rhiza book
# command intentionally no longer installs the package editable
# (see .rhiza/tests/integration/test_docs_targets.py::
# test_default_book_command_does_not_use_editable_install), so a src-layout
# project must point the handler at src/ itself.
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tschm/pyhrp

theme:
  icon:
    logo: material/chart-line
