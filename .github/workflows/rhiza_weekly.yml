name: "(RHIZA) WEEKLY"

# Runs weekly checks that are too slow or noisy for every push:
#
#   dep-compat-test  — Resolves all dependencies fresh (ignoring the lockfile)
#                      and runs the full test suite. Catches newly-released
#                      packages that break compatibility before Renovate picks
#                      them up. Runs on schedule/dispatch only.
#
#   link-check       — Verifies that all hyperlinks in README.md are reachable.
#                      Runs on schedule/dispatch only.

permissions:
  contents: read
  actions: read

on:
  #push:
  #  branches: [main]
  #  paths: [README.md]
  #pull_request:
  #  paths: [README.md]
  schedule:
    - cron: "0 8 * * 1"  # Every Monday at 08:00 UTC
  workflow_dispatch:

jobs:
  dep-compat-test:
    name: Test with latest compatible dependencies
    runs-on: ubuntu-latest
    #if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.7"

      - name: Configure git auth for private packages
        uses: ./.github/actions/configure-git-auth
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Resolve and install latest compatible dependencies
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: |
          # --upgrade ignores the committed lockfile and resolves the newest
          # versions that satisfy pyproject.toml constraints.
          uv sync --upgrade

      - name: Show resolved package versions
        run: |
          echo "=== Installed package versions ==="
          uv pip list

      - name: Run tests
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: make test

  benchmark:
    name: HRP benchmark regression check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.7"

      - name: Configure git auth for private packages
        uses: ./.github/actions/configure-git-auth
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Install dependencies
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: uv sync --group dev

      - name: Download previous benchmark baseline artifact (if available)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p _tests/benchmarks
          artifact_url="$(
            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts?name=hrp-benchmark-baseline&per_page=1" \
            | jq -r '.artifacts[] | select(.expired == false) | .archive_download_url' \
            | head -n1
          )"

          if [ -n "${artifact_url}" ] && [ "${artifact_url}" != "null" ]; then
            curl -fsSL -L \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${artifact_url}" \
              -o _tests/benchmarks/baseline.zip
            unzip -p _tests/benchmarks/baseline.zip baseline.json > _tests/benchmarks/baseline.json
          else
            echo "No previous baseline artifact found."
          fi

      - name: Run benchmark tests
        run: |
          mkdir -p _tests/benchmarks
          uv run pytest tests/test_benchmark.py \
            -m stress \
            --benchmark-only \
            --benchmark-json=_tests/benchmarks/current.json

      - name: Compare benchmark runtimes against baseline
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import shutil
          from pathlib import Path

          threshold = 0.20
          current_path = Path("_tests/benchmarks/current.json")
          baseline_path = Path("_tests/benchmarks/baseline.json")

          if not baseline_path.exists():
              print("No baseline available yet. Initializing baseline from current run.")
              shutil.copyfile(current_path, baseline_path)
              raise SystemExit(0)

          current = json.loads(current_path.read_text())
          baseline = json.loads(baseline_path.read_text())

          def means(data: dict) -> dict[str, float]:
              return {entry["fullname"]: float(entry["stats"]["mean"]) for entry in data.get("benchmarks", [])}

          current_means = means(current)
          baseline_means = means(baseline)
          regressions: list[tuple[str, float, float, float]] = []

          for name, baseline_mean in baseline_means.items():
              current_mean = current_means.get(name)
              if current_mean is None:
                  continue
              if baseline_mean <= 0:
                  continue
              regression = (current_mean - baseline_mean) / baseline_mean
              if regression > threshold:
                  regressions.append((name, baseline_mean, current_mean, regression))

          if regressions:
              print("Performance regression detected (>20%):")
              for name, baseline_mean, current_mean, regression in regressions:
                  print(
                      f"- {name}: baseline={baseline_mean:.6f}s "
                      f"current={current_mean:.6f}s regression={regression * 100:.2f}%"
                  )
              raise SystemExit(1)

          print("Benchmark runtime regression check passed.")
          shutil.copyfile(current_path, baseline_path)
          PY

      - name: Upload benchmark results artifact
        uses: actions/upload-artifact@v7
        with:
          name: hrp-benchmark-results
          path: _tests/benchmarks/current.json
          if-no-files-found: error

      - name: Upload benchmark baseline artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hrp-benchmark-baseline
          path: _tests/benchmarks/baseline.json
          if-no-files-found: ignore

  semgrep:
    name: Semgrep (numpy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.7"

      - name: Configure git auth for private packages
        uses: ./.github/actions/configure-git-auth
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Run Semgrep
        env:
          UV_EXTRA_INDEX_URL: ${{ secrets.UV_EXTRA_INDEX_URL }}
        run: make semgrep

  pip-audit:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.7"

      - name: Run pip-audit
        run: uvx pip-audit

  link-check:
    name: Check links in README.md
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Check links in README.md
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,206,429
            README.md
          fail: true
