# Workflow: Lowest-direct dependency compatibility
#
# Purpose: Verify the test suite passes when uv resolves every direct
#          dependency to its declared floor version. This guards against
#          accidentally raising the effective minimum by using an API that
#          only exists in a newer release.
#
# Trigger: On push and pull_request.

name: "Lowest-direct deps"

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lowest-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Run tests with lowest-direct resolution
        run: uv run --resolution lowest-direct pytest tests -q --ignore=tests/stress --ignore=tests/benchmarks
